<section class="contact" id="contact">
  <div class="contact-left">
    <h2 class="section-title fade-up">{{ lang.t.contact_title }}</h2>
    <div class="section-underline fade-up delay-1"></div>

    <p class="contact-question fade-up delay-2">{{ lang.t.contact_question }}</p>
    <p class="contact-text fade-up delay-3">{{ lang.t.contact_text }}</p>

    <div class="contact-socials fade-up delay-4">
      <p class="socials-label">{{ lang.t.contact_redes }}</p>
      <div class="socials-row">
        <a href="mailto:monterrozag21@gmail.com" class="social-btn" title="Email">
          <ion-icon name="mail-outline"></ion-icon>
        </a>
        <a href="https://github.com/GersonMonterroza21" target="_blank" class="social-btn" title="GitHub">
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <a href="https://linkedin.com/in/gerson-monterroza-b69ba2395" target="_blank" class="social-btn" title="LinkedIn">
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
      </div>
    </div>

    <a [href]="lang.current() === 'ES' ? 'assets/CV_Gerson_Monterroza_ES.pdf' : 'assets/CV_Gerson_Monterroza_EN.pdf'" 
   target="_blank" 
   class="cv-btn fade-up delay-5">
  <ion-icon name="download-outline"></ion-icon> {{ lang.t.contact_cv }}
</a>
  </div>

  <div class="contact-divider"></div>

  <div class="contact-right fade-right delay-2">
    <div class="contact-glow"></div>
    <div class="contact-form">
      <div class="form-row">
        <div class="form-group">
          <label>{{ lang.t.contact_nombre }}</label>
          <input
            type="text"
            [(ngModel)]="form.name"
            (blur)="touch('name')"
            [placeholder]="lang.t.contact_placeholder_nombre"
            [class.invalid]="nameError" />
          <span class="field-error" *ngIf="nameError">{{ nameError }}</span>
        </div>
        <div class="form-group">
          <label>{{ lang.t.contact_email }}</label>
          <input
            type="email"
            [(ngModel)]="form.email"
            (blur)="touch('email')"
            [placeholder]="lang.t.contact_placeholder_email"
            [class.invalid]="emailError" />
          <span class="field-error" *ngIf="emailError">{{ emailError }}</span>
        </div>
      </div>
      <div class="form-group">
        <label>{{ lang.t.contact_mensaje }}</label>
        <textarea
          [(ngModel)]="form.message"
          (blur)="touch('message')"
          rows="6"
          [placeholder]="lang.t.contact_placeholder_mensaje"
          [class.invalid]="messageError"></textarea>
        <span class="field-error" *ngIf="messageError">{{ messageError }}</span>
      </div>

      <button class="submit-btn" (click)="sendMessage()" [disabled]="sending">
        {{ sending ? lang.t.contact_btn_enviando : lang.t.contact_btn_enviar }}
      </button>

      <p *ngIf="sent" class="form-success">{{ lang.t.contact_success }}</p>
      <p *ngIf="error" class="form-error">{{ lang.t.contact_error }}</p>
    </div>
  </div>
</section>
