<section class="contact" id="contact">
  <div class="contact-left">
    <h2 class="section-title fade-up">CONTACTO</h2>
    <div class="section-underline fade-up delay-1"></div>

    <p class="contact-question fade-up delay-2">¿Tienes un proyecto en mente?</p>
    <p class="contact-text fade-up delay-3">
      Estoy listo para llevar tus ideas al siguiente nivel.
      Escríbeme y hablemos sobre cómo puedo ayudarte.
    </p>

    <div class="contact-socials fade-up delay-4">
      <p class="socials-label">REDES SOCIALES</p>
      <div class="socials-row">
        <a href="mailto:monterrozag21@gmail.com" class="social-btn" title="Email">
          <ion-icon name="mail-outline"></ion-icon>
        </a>
        <a href="https://github.com/GersonMonterroza21" target="_blank" class="social-btn" title="GitHub">
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <a href="https://linkedin.com/in/gerson-monterroza-b69ba2395" target="_blank" class="social-btn" title="LinkedIn">
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
      </div>
    </div>

    <a href="assets/CV_Gerson_Monterroza.pdf" target="_blank" class="cv-btn fade-up delay-5">
      <ion-icon name="download-outline"></ion-icon> Descargar CV
    </a>
  </div>

  <div class="contact-right fade-right delay-2">
    <div class="contact-form">
      <div class="form-row">
        <div class="form-group">
          <label>NOMBRE</label>
          <input type="text" [(ngModel)]="form.name" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label>CORREO ELECTRÓNICO</label>
          <input type="email" [(ngModel)]="form.email" placeholder="tu@email.com" />
        </div>
      </div>
      <div class="form-group">
        <label>TU MENSAJE</label>
        <textarea [(ngModel)]="form.message" rows="6" placeholder="Cuéntame sobre tu proyecto..."></textarea>
      </div>
      <button class="submit-btn" (click)="sendMessage()">ENVIAR MENSAJE</button>
    </div>
  </div>
</section>
