<section class="hero" id="hero">
  <div class="particles">
    <div class="particle" *ngFor="let p of particles" 
      [style.left.%]="p.x" 
      [style.top.%]="p.y"
      [style.width.px]="p.size"
      [style.height.px]="p.size"
      [style.animationDelay]="p.delay">
    </div>
  </div>

  <div class="hero-content">
    <p class="hero-subtitle">FULL STACK DEVELOPER</p>
    <h1 class="hero-title">
      Transformando ideas en<br>
      <span class="accent typewriter">{{ displayText }}<span class="cursor">|</span></span>
    </h1>
    <p class="hero-description">
      Hola, soy <strong>Tu Nombre</strong>, un desarrollador web enfocado en crear
      interfaces modernas, animadas y bien estructuradas.
    </p>

    <div class="hero-tags">
      <span class="tag">Angular</span>
      <span class="tag">Ionic</span>
      <span class="tag">TypeScript</span>
      <span class="tag">Node
