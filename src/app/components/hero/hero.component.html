<section class="hero" id="hero">
  <div class="hero-content">
    <p class="hero-subtitle">{{ lang.t.hero_subtitle }}</p>
    <h1 class="hero-title">
      {{ lang.t.hero_title }}<br>
      <span class="accent typewriter">{{ displayText }}<span class="cursor">|</span></span>
    </h1>
    <p class="hero-description" [innerHTML]="lang.t.hero_desc"></p>

    <div class="hero-tags">
      <span class="tag">Vue.js</span>
      <span class="tag">Angular</span>
      <span class="tag">Ionic</span>
      <span class="tag">Laravel</span>
      <span class="tag">Firebase</span>
    </div>

    <div class="hero-buttons">
      <button class="btn-primary" (click)="scrollToSection('projects')">
        {{ lang.t.hero_btn_proyectos }}
      </button>
      <button class="btn-secondary" (click)="scrollToSection('contact')">
        {{ lang.t.hero_btn_contacto }}
      </button>
    </div>
  </div>
</section>
