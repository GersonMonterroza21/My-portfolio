<nav class="navbar" [class.scrolled]="isScrolled">
<div class="nav-logo" (click)="scrollToSection('hero')">
  <img [src]="isDark ? 'assets/logo2.png' : 'assets/logo1.png'" alt="Logo" class="logo-img" />
</div>

  <div class="nav-right">
    <button class="theme-toggle" (click)="toggleTheme()">
      <ion-icon [name]="isDark ? 'sunny-outline' : 'moon-outline'"></ion-icon>
    </button>
    <span class="nav-lang" (click)="toggleLang()">{{ currentLang }}</span>
  </div>
</nav>

<div class="side-dots">
  <div
    *ngFor="let section of sections; let i = index"
    class="dot-item"
    [class.active]="activeSection === i"
    (click)="scrollToSection(section.id)">
    <span class="dot-label">{{ section.label }}</span>
    <div class="dot"></div>
  </div>
</div>

<div class="mobile-nav">
  <div
    *ngFor="let section of sections; let i = index"
    class="mobile-nav-item"
    [class.active]="activeSection === i"
    (click)="scrollToSection(section.id)">
    <ion-icon [name]="section.icon"></ion-icon>
    <span class="mobile-nav-label">{{ section.label }}</span>
  </div>
</div>
